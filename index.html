<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地層疊疊樂 (Dice Stratigraphy Jenga)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; color: #f1c40f; }
        #game-container {
            position: relative;
            margin-top: 10px;
        }
        canvas {
            background: #34495e;
            border: 4px solid #bdc3c7;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .dice-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a252f;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #34495e;
        }
        #dice-result {
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            color: #fff;
            background-color: #7f8c8d;
            transition: all 0.3s;
        }
        .controls {
            margin-top: 15px;
            text-align: center;
            max-width: 500px;
            font-size: 14px;
            color: #bdc3c7;
        }
        button {
            padding: 10px 20px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #d35400; }
        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>⏳ 地層疊疊樂 (骰子限定版)</h1>
    <div style="margin-bottom: 15px; color: #ecf0f1;">依照骰子指示，抽取對應的地層岩石！</div>

    <div class="dice-area">
        <button id="roll-btn" onclick="rollDice()">🎲 投擲地層骰子</button>
        <div>目前指定：<span id="dice-result">請先骰骰子</span></div>
    </div>

    <div class="info-panel">
        <div>得分: <span id="score">0</span></div>
        <div>狀態: <span id="status" style="color: #2ecc71;">穩定</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <div style="margin-top: 15px;">
        <button onclick="resetGame()" style="background-color: #2980b9;">重新開始</button>
    </div>

    <div class="controls">
        <p><strong>🎲 遊戲規則：</strong></p>
        <p>1. 每回合必須先按 <strong>[投擲地層骰子]</strong>。<br>
           2. 只能點擊與骰子指定顏色相同的方塊。<br>
           3. 不能直接抽取當前最頂層的地層方塊。</p>
        <p>🔴 火成岩（頂層） | 🟡 變質岩（中層） | 🟤 沉積岩（底層）</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const statusEl = document.getElementById('status');
        const diceResultEl = document.getElementById('dice-result');
        const rollBtn = document.getElementById('roll-btn');

        const BLOCK_WIDTH = 80;
        const BLOCK_HEIGHT = 30;
        const BLOCKS_PER_ROW = 3;
        const TOTAL_ROWS = 14;
        const TOWER_START_X = 120;
        const TOWER_START_Y = 500;

        let blocks = [];
        let score = 0;
        let gameOver = false;
        let currentDiceTarget = null; 

        const LAYER_TYPES = {
            SEDIMENTARY: { id: 'SEDIMENTARY', name: '沉積岩 🟤', color: '#8a6d51', pattern: 'line' },
            METAMORPHIC: { id: 'METAMORPHIC', name: '變質岩 🟡', color: '#d4ac0d', pattern: 'wave' },
            IGNEOUS: { id: 'IGNEOUS', name: '火成岩 🔴', color: '#c0392b', pattern: 'dot' }
        };

        class Block {
            constructor(row, col) {
                this.row = row;
                this.col = col;
                this.width = BLOCK_WIDTH;
                this.height = BLOCK_HEIGHT;
                this.isExtracted = false;
                
                if (row < 5) this.type = LAYER_TYPES.SEDIMENTARY;
                else if (row < 10) this.type = LAYER_TYPES.METAMORPHIC;
                else this.type = LAYER_TYPES.IGNEOUS;

                this.updatePosition();
            }

            updatePosition() {
                this.x = TOWER_START_X + this.col * this.width;
                this.y = TOWER_START_Y - this.row * this.height;
            }

            draw() {
                if (this.isExtracted) return;

                ctx.fillStyle = this.type.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);

                // 繪製地質紋理
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                if (this.type.pattern === 'line') {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + 10); ctx.lineTo(this.x + this.width, this.y + 10);
                    ctx.moveTo(this.x, this.y + 20); ctx.lineTo(this.x + this.width, this.y + 20);
                    ctx.stroke();
                } else if (this.type.pattern === 'wave') {
                    ctx.font = '10px Arial';
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillText('～～～', this.x + 15, this.y + 18);
                } else if (this.type.pattern === 'dot') {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(this.x + 20, this.y + 10, 4, 4);
                    ctx.fillRect(this.x + 50, this.y + 18, 4, 4);
                }
            }

            contains(mx, my) {
                return !this.isExtracted && mx >= this.x && mx <= this.x + this.width && my >= this.y && my <= this.y + this.height;
            }
        }

        function initGame() {
            blocks = [];
            score = 0;
            gameOver = false;
            currentDiceTarget = null;
            
            scoreEl.innerText = score;
            statusEl.innerText = "穩定";
            statusEl.style.color = "#2ecc71";
            
            diceResultEl.innerText = "請先骰骰子";
            diceResultEl.style.backgroundColor = "#7f8c8d";
            rollBtn.disabled = false;

            for (let r = 0; r < TOTAL_ROWS; r++) {
                for (let c = 0; c < BLOCKS_PER_ROW; c++) {
                    blocks.push(new Block(r, c));
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 地面
            ctx.fillStyle = '#1a252f';
            ctx.fillRect(0, TOWER_START_Y + BLOCK_HEIGHT, canvas.width, canvas.height);

            blocks.forEach(b => b.draw());

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚠️ 地層結構崩塌！', canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '18px Arial';
                ctx.fillText(`最終得分：${score} 個地層方塊`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        // 安全的投擲骰子邏輯 (修復無窮遞迴 Bug)
        function rollDice() {
            if (gameOver) return;

            const types = Object.values(LAYER_TYPES);
            let maxCurrentRow = Math.max(...blocks.filter(bk => !bk.isExtracted).map(bk => bk.row));
            
            // 檢查場上還剩哪些種類的岩石是可以合法抽取的
            let validTypes = types.filter(type => {
                return blocks.some(b => !b.isExtracted && b.type.id === type.id && b.row !== maxCurrentRow);
            });

            // 如果全部岩石都無法抽了（幾乎不可能發生的極端情況）
            if (validTypes.length === 0) {
                alert("場上已無可抽取的方塊！");
                return;
            }

            // 只從合法的種類中隨機骰一個
            const randomType = validTypes[Math.floor(Math.random() * validTypes.length)];
            currentDiceTarget = randomType;
            
            // 更新 UI
            diceResultEl.innerText = currentDiceTarget.name;
            diceResultEl.style.backgroundColor = currentDiceTarget.color;
            rollBtn.disabled = true; 
        }

        function checkStability() {
            for (let r = 1; r < TOTAL_ROWS; r++) {
                let currentLayer = blocks.filter(b => b.row === r && !b.isExtracted);
                let baseLayer = blocks.filter(b => b.row === r - 1 && !b.isExtracted);
                let higherLayerHasBlocks = blocks.some(b => b.row > r && !b.isExtracted);

                if (currentLayer.length === 0 && higherLayerHasBlocks) return false;

                if (currentLayer.length > 0) {
                    if (baseLayer.length === 0) return false;

                    let currentLayerCenterX = currentLayer.reduce((sum, b) => sum + (b.x + BLOCK_WIDTH/2), 0) / currentLayer.length;
                    let baseMinX = Math.min(...baseLayer.map(b => b.x));
                    let baseMaxX = Math.max(...baseLayer.map(b => b.x + BLOCK_WIDTH));

                    if (currentLayerCenterX < baseMinX || currentLayerCenterX > baseMaxX) return false;
                }
            }
            return true;
        }

        canvas.addEventListener('click', function(e) {
            if (gameOver) return;

            if (!currentDiceTarget) {
                alert("請先點擊上方按鈕投擲骰子！");
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            for (let i = 0; i < blocks.length; i++) {
                let b = blocks[i];
                if (b.contains(mouseX, mouseY)) {
                    
                    let maxCurrentRow = Math.max(...blocks.filter(bk => !bk.isExtracted).map(bk => bk.row));
                    if (b.row === maxCurrentRow) {
                        alert("不能直接抽取最頂層的地層！");
                        return;
                    }

                    if (b.type.id !== currentDiceTarget.id) {
                        alert(`選錯囉！骰子指定要抽取【${currentDiceTarget.name}】，但你點到了【${b.type.name}】。`);
                        return;
                    }

                    b.isExtracted = true;
                    score++;
                    scoreEl.innerText = score;

                    currentDiceTarget = null;
                    diceResultEl.innerText = "請重新骰骰子";
                    diceResultEl.style.backgroundColor = "#7f8c8d";
                    rollBtn.disabled = false;

                    if (!checkStability()) {
                        gameOver = true;
                        statusEl.innerText = "已崩塌！";
                        statusEl.style.color = "#e74c3c";
                        rollBtn.disabled = true;
                    }
                    
                    draw();
                    break;
                }
            }
        });

        function resetGame() {
            initGame();
        }

        // 確保網頁載入時啟動遊戲
        window.onload = function() {
            initGame();
        };
    </script>
</body>
</html>
