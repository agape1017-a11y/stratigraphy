<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門半島山峰 Higher or Lower?</title>
    <style>
        :root {
            --primary-color: #008080; /* 改用優雅的深青色 */
            --secondary-color: #5a6268;
            --success-color: #2e7d32;
            --danger-color: #c62828;
            --bg-color: #f7f9f9;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'PingFang HK', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 25px;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.6rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .subtitle {
            margin: 0;
            font-size: 0.95rem;
            color: var(--secondary-color);
        }

        #game-container {
            width: 92%;
            max-width: 800px;
            background-color: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #score-board {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            background-color: #e0f2f1;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto;
        }

        #comparison-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
        }

        .hill-card {
            flex: 1;
            padding: 25px 15px;
            border: 2px solid #eef2f3;
            border-radius: 12px;
            background-color: #fcfdfe;
            transition: all 0.3s ease;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            margin: 0 0 10px 0;
            font-size: 0.85rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hill-card h2 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .hill-desc {
            font-size: 0.85rem;
            color: #e67e22;
            margin-top: -5px;
            margin-bottom: 10px;
            min-height: 1.2em;
        }

        .height-display {
            font-size: 2.6rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .unit {
            font-size: 1.1rem;
            color: var(--secondary-color);
            margin-left: 4px;
            font-weight: normal;
        }

        #unknown-height {
            font-size: 2.8rem;
            font-weight: 800;
            color: #bdc3c7;
            margin: 10px 0;
        }

        #versus {
            font-size: 1.6rem;
            font-weight: 900;
            color: #bdc3c7;
            background: #f1f2f6;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 14px 35px;
            font-size: 1.15rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        .btn-higher {
            background-color: var(--success-color);
        }

        .btn-higher:hover {
            background-color: #256329;
        }

        .btn-lower {
            background-color: var(--danger-color);
        }

        .btn-lower:hover {
            background-color: #a81d1d;
        }

        #result-message {
            font-size: 1.25rem;
            font-weight: bold;
            min-height: 1.5em;
            margin-top: 5px;
        }

        #game-over-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(44, 62, 80, 0.96);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 25px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        #game-over-screen h2 {
            font-size: 3.2rem;
            margin: 0;
            color: #f1c40f;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        #final-score-message {
            font-size: 1.5rem;
            margin: 10px 0;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
        }

        #final-score {
            font-weight: bold;
            color: #f1c40f;
            font-size: 2rem;
        }

        .btn-restart {
            background-color: var(--primary-color);
            padding: 12px 40px;
        }
        
        .btn-restart:hover {
            background-color: #006666;
        }

        .landscape-tip {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 15px;
            border-top: 1px dashed #e0e0e0;
            padding-top: 15px;
        }

        /* 響應式排版 */
        @media (max-width: 600px) {
            #comparison-area {
                flex-direction: column;
                gap: 10px;
            }
            .hill-card {
                width: 100%;
                min-height: 140px;
                padding: 15px;
            }
            #versus {
                margin: 5px 0;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>澳門半島山峰 Higher or Lower? (教學版)</h1>
        <p class="subtitle">根據最新官方測量高度，考考你對澳門半島七大主要丘陵的高度排序認知！</p>
    </header>

    <div id="game-container">
        <div id="score-board">當前得分: <span id="current-score">0</span> / 6</div>

        <div id="comparison-area">
            <!-- 左邊：當前山峰 -->
            <div class="hill-card" id="current-hill">
                <p class="label">當前參考山峰</p>
                <h2 id="current-name">---</h2>
                <div class="hill-desc" id="current-desc"></div>
                <div class="height-display"><span id="current-height">--</span><span class="unit">米 (m)</span></div>
            </div>

            <div id="versus">VS</div>

            <!-- 右邊：下一座山峰 -->
            <div class="hill-card" id="next-hill">
                <p class="label">下一座待猜山峰</p>
                <h2 id="next-name">---</h2>
                <div class="hill-desc" id="next-desc"></div>
                <div id="unknown-height">? ? ?</div>
                <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #7f8c8d;">比左邊更高還是更矮？</p>
            </div>
        </div>

        <div id="result-message"></div>

        <div id="controls">
            <button class="btn-higher" onclick="makeGuess('higher')">更高 ▲</button>
            <button class="btn-lower" onclick="makeGuess('lower')">更矮 ▼</button>
        </div>

        <div class="landscape-tip">
            💡 <b>地理小知識：</b> 澳門半島多為丘陵地貌。崗頂、白鴿巢公園等部分小型台地（消失的地貌）現已被開發或覆蓋。
        </div>
    </div>

    <!-- 遊戲結束彈窗 -->
    <div id="game-over-screen">
        <h2 id="game-over-title">挑戰結束</h2>
        <p id="final-score-message">你的最終得分是: <span id="final-score">0</span></p>
        <button class="btn-restart" onclick="restartGame()">再試一次</button>
    </div>

    <script>
        // 1. 根據上傳的官方圖片更新數據（精準高度）
        const macauHills = [
            { name: "東望洋山 (松山)", height: 90.0, desc: "最高峰，古稱琴山" },
            { name: "媽閣山", height: 71.6, desc: "半島第二高峰" },
            { name: "西望洋山", height: 62.7, desc: "主教山" },
            { name: "望廈山", height: 60.7, desc: "黑沙環地標" },
            { name: "大炮台山", height: 57.3, desc: "緊鄰大三巴牌坊" },
            { name: "青洲山", height: 54.5, desc: "西北角歷史地標" },
            { name: "馬交石山", height: 48.1, desc: "東北部沿海山丘" }
        ];

        // 2. 遊戲變數
        let playlist = [];
        let currentIndex = 0;
        let score = 0;
        let isGameOver = false;

        // 3. DOM 元素
        const currentNameEl = document.getElementById('current-name');
        const currentDescEl = document.getElementById('current-desc');
        const currentHeightEl = document.getElementById('current-height');
        const nextNameEl = document.getElementById('next-name');
        const nextDescEl = document.getElementById('next-desc');
        const scoreEl = document.getElementById('current-score');
        const resultMsgEl = document.getElementById('result-message');
        const gameOverScreenEl = document.getElementById('game-over-screen');
        const gameOverTitleEl = document.getElementById('game-over-title');
        const finalScoreEl = document.getElementById('final-score');
        const finalScoreMsgEl = document.getElementById('final-score-message');

        // 4. 初始化遊戲
        function initGame() {
            score = 0;
            isGameOver = false;
            scoreEl.innerText = score;
            resultMsgEl.innerText = "";
            resultMsgEl.style.color = "initial";
            gameOverScreenEl.style.display = "none";

            // 洗牌：隨機打亂七座山的順序，確保每次遊玩都有新意
            playlist = shuffleArray([...macauHills]);
            currentIndex = 0;

            updateDisplay();
        }

        // 5. 更新畫面
        function updateDisplay() {
            const currentHill = playlist[currentIndex];
            const nextHill = playlist[currentIndex + 1];

            // 設置左邊
            currentNameEl.innerText = currentHill.name;
            currentDescEl.innerText = currentHill.desc || "";
            currentHeightEl.innerText = currentHill.height.toFixed(1);

            // 設置右邊 (隱藏高度)
            nextNameEl.innerText = nextHill.name;
            nextDescEl.innerText = nextHill.desc || "";
        }

        // 6. 核心判斷邏輯
        function makeGuess(guess) {
            if (isGameOver) return;

            const currentHeight = playlist[currentIndex].height;
            const nextHeight = playlist[currentIndex + 1].height;

            let isCorrect = false;
            if (guess === 'higher' && nextHeight > currentHeight) isCorrect = true;
            if (guess === 'lower' && nextHeight < currentHeight) isCorrect = true;
            if (nextHeight === currentHeight) isCorrect = true; // 防呆設計

            if (isCorrect) {
                handleCorrectAnswer(nextHeight);
            } else {
                handleWrongAnswer(nextHeight);
            }
        }

        // 7. 答對時的處理
        function handleCorrectAnswer(actualHeight) {
            score++;
            scoreEl.innerText = score;
            resultMsgEl.innerText = "答對了！太棒了 ✔";
            resultMsgEl.style.color = "var(--success-color)";

            currentIndex++;

            // 判斷是否答完所有 (7座山共可比對6次)
            if (currentIndex < playlist.length - 1) {
                setTimeout(() => {
                    resultMsgEl.innerText = "";
                    updateDisplay();
                }, 1200);
            } else {
                setTimeout(() => {
                    endGame(true);
                }, 800);
            }
        }

        // 8. 答錯時的處理
        function handleWrongAnswer(actualHeight) {
            isGameOver = true;
            resultMsgEl.innerText = `答錯了... 它其實是 ${actualHeight.toFixed(1)} 米 ✘`;
            resultMsgEl.style.color = "var(--danger-color)";

            setTimeout(() => {
                endGame(false);
            }, 1800);
        }

        // 9. 遊戲結束畫面
        function endGame(isWin) {
            isGameOver = true;
            gameOverScreenEl.style.display = "flex";
            finalScoreEl.innerText = score;
            
            if (isWin) {
                gameOverTitleEl.innerText = "🏆 完美通關！";
                gameOverTitleEl.style.color = "#f1c40f";
                finalScoreMsgEl.innerHTML = `超級無敵！你成功排對了所有隨機山峰的高度順序！<br>最終分數：<span id="final-score">6 / 6</span><br><br><span style="font-size:1rem; color:#bdc3c7;">看來你對澳門半島的地形瞭如指掌！</span>`;
            } else {
                gameOverTitleEl.innerText = "繼續努力 💪";
                gameOverTitleEl.style.color = "white";
                finalScoreMsgEl.innerHTML = `可惜功敗垂成！你的最終分數是: <span id="final-score">${score}</span> / 6<br><br><span style="font-size:1rem; color:#bdc3c7;">多玩幾次，你一定能完全掌握這七座山峰的高度順序！</span>`;
            }
        }

        // 10. 重玩
        function restartGame() {
            initGame();
        }

        // 洗牌演算法 (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 啟動遊戲
        initGame();
    </script>
</body>
</html>
