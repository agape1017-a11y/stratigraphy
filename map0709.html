<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>世界地圖路線繪製遊戲</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }
        h3 {
            margin: 10px 0;
            color: #333;
        }
        .name-input-container {
            margin-bottom: 10px;
        }
        .name-input-container input {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            width: 200px;
        }
        #canvas-container {
            position: relative;
            width: 95vw;
            max-width: 1000px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            background-color: white;
        }
        #map-bg {
            width: 100%;
            display: block;
        }
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            touch-action: none;
        }
        .toolbox {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
        }
        button, select {
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            border-radius: 20px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button:active {
            background-color: #0056b3;
        }
        button.clear-btn {
            background-color: #dc3545;
        }
        button.save-btn {
            background-color: #28a745;
        }
    </style>
</head>

            ctx.lineJoin = 'round';
        }

        if (img.complete) { resizeCanvas(); } else { img.onload = resizeCanvas; }
        window.addEventListener('resize', resizeCanvas);

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            isDrawing = true;
            const coords = getCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const coords = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            ctx.strokeStyle = document.getElementById('colorSelect').value;
            ctx.lineWidth = document.getElementById('lineWidthSelect').value;
            ctx.stroke();
            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDrawing() { isDrawing = false; }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function saveAndUpload() {
            const name = document.getElementById('studentName').value.trim() || "未命名學生";
            const mergeCanvas = document.createElement('canvas');
            const mCtx = mergeCanvas.getContext('2d');
            
            mergeCanvas.width = img.naturalWidth || img.clientWidth;
            mergeCanvas.height = img.naturalHeight || img.clientHeight;
            
            mCtx.drawImage(img, 0, 0, mergeCanvas.width, mergeCanvas.height);
            mCtx.drawImage(canvas, 0, 0, mergeCanvas.width, mergeCanvas.height);
            
            const dataURL = mergeCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `${name}-地理路線圖.png`;
            link.href = dataURL;
            link.click();
            
            alert(`🎉 儲存成功！\n檔案已儲存為：${name}-地理路線圖.png\n請將下載的圖片交給老師。`);
        }
    </script>
</body>
</html>
